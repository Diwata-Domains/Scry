# HTML example matching the quickstart (illustrative — point `url` at a real page).
#   scry run examples/sources/articles.yaml

name: example-articles
fetch:
  mode: web
  url: https://example.com/articles
parse:
  mode: html
  records: "article.post"
  fields:
    title: "h2::text"
    url: "a::attr(href)"
    published: "time::attr(datetime)"
output_schema:
  entity_type: article
  required: [title]
schedule: "0 * * * *"   # hourly (used by `scry scheduler`)
tos_class: clean_public   # clean_public | clean_user_session | restricted_internal
                          # recorded on the artifact + every record so consumers can gate captures
health:                   # drift checks (used by `scry health-check` + the worker)
  min_records: 1          # fewer than this => suspect (selector drift / login wall)
  required_nonempty: [title]   # if 'title' is empty in every record => selector likely broke
